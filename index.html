<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>দৈনিক চেকলিস্ট</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card: #20243a;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --border: #2d3148;
    --done-bg: #1a2e1a;
    --done-text: #86efac;
  }
  body {
    font-family: 'Hind Siliguri', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* Tab Nav */
  .tab-nav {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .tab-btn {
    flex: 1;
    padding: 14px 8px;
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent); }

  .tab-panel { display: none; padding: 20px 16px; }
  .tab-panel.active { display: block; }

  /* Header */
  header { text-align: center; margin-bottom: 28px; }
  header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }
  .date-badge {
    display: inline-block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 16px;
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* Progress */
  .progress-wrap {
    background: var(--surface);
    border-radius: 16px;
    padding: 16px 20px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .progress-info span:last-child { font-weight: 600; color: var(--accent2); }
  .progress-bar { background: var(--card); border-radius: 10px; height: 8px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }

  .section-label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 20px 0 10px;
  }

  /* Checklist */
  .checklist { display: flex; flex-direction: column; gap: 8px; }
  .item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .item:active { transform: scale(0.985); }
  .item.done { background: var(--done-bg); border-color: #22543d; }
  .item-wrap { position: relative; touch-action: pan-y; }
  .item-wrap.dragging { opacity: 0.75; z-index: 50; box-shadow: 0 10px 24px rgba(0,0,0,0.45); }
  .item-wrap.dragging .item { border-color: var(--accent); }
  .drag-handle {
    width: 22px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--muted);
    font-size: 1.1rem;
    line-height: 1;
    cursor: grab;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    letter-spacing: -1px;
    margin-left: -6px;
    border-radius: 6px;
  }
  .drag-handle:active { cursor: grabbing; color: var(--accent2); background: var(--card); }
  .checkbox {
    width: 24px;
    height: 24px;
    border-radius: 8px;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, border-color 0.2s;
    font-size: 14px;
  }
  .item.done .checkbox { background: var(--green); border-color: var(--green); }
  .checkbox.done-check { background: var(--green); border-color: var(--green); }
  .item-text { flex: 1; font-size: 0.95rem; font-weight: 400; line-height: 1.4; transition: color 0.2s, text-decoration 0.2s; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
  .item.done .item-text { color: var(--done-text); text-decoration: line-through; text-decoration-color: #4ade80; }
  .item-emoji { font-size: 1.2rem; flex-shrink: 0; }
  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.85rem;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    opacity: 0.5;
    transition: opacity 0.2s, color 0.2s;
    flex-shrink: 0;
  }
  .item:hover .del-btn { opacity: 1; color: var(--red); }
  .expand-arrow { font-size: 0.75rem; color: var(--muted); flex-shrink: 0; transition: transform 0.2s; }
  .item.expanded .expand-arrow { transform: rotate(180deg); }

  .sub-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 14px 14px;
    margin-top: -10px;
    padding: 6px 16px 12px 54px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .sub-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    cursor: pointer;
    user-select: none;
  }
  .sub-checkbox {
    width: 18px;
    height: 18px;
    border-radius: 6px;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 11px;
  }
  .sub-item.done .sub-checkbox { background: var(--green); border-color: var(--green); }
  .sub-text { font-size: 0.88rem; color: var(--text); }
  .sub-item.done .sub-text { color: var(--done-text); text-decoration: line-through; }

  .sub-add-row { display: flex; gap: 6px; margin-top: 4px; }
  .sub-add-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    color: var(--text);
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 0.8rem;
    outline: none;
  }
  .sub-add-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--accent2);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.8rem;
    cursor: pointer;
  }

  /* Edit panel */
  .edit-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 14px 14px;
    margin-top: -10px;
    padding: 12px 16px 14px 54px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .edit-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .edit-row { display: flex; gap: 6px; }
  .edit-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    color: var(--text);
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 0.85rem;
    outline: none;
  }
  .edit-input:focus { border-color: var(--accent); }
  .edit-actions { display: flex; gap: 8px; margin-top: 4px; }
  .edit-save-btn, .edit-cancel-btn {
    border-radius: 8px;
    padding: 7px 14px;
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
  }
  .edit-save-btn { background: var(--accent); color: #fff; border-color: var(--accent); }
  .edit-cancel-btn { background: var(--card); color: var(--muted); }
  .edit-delete-btn { background: var(--card); color: var(--red); border-color: var(--red); margin-left: auto; }

  /* Add box */
  .add-box {
    margin-top: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
  }
  .add-box h3 { font-size: 0.85rem; color: var(--muted); margin-bottom: 12px; font-weight: 500; }
  .add-row { display: flex; gap: 8px; }
  .add-input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 0.9rem;
    outline: none;
  }
  .add-input:focus { border-color: var(--accent); }
  .emoji-pick {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 1rem;
    outline: none;
    cursor: pointer;
  }
  .add-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .add-btn:hover { background: var(--accent2); }

  .custom-emoji-row { display: flex; gap: 8px; margin-top: 8px; }
  .custom-emoji-input { font-size: 0.82rem; }

  .reset-note { text-align: center; margin-top: 24px; font-size: 0.78rem; color: var(--muted); }

  .all-done {
    display: none;
    text-align: center;
    background: linear-gradient(135deg, #064e3b, #065f46);
    border: 1px solid #34d39944;
    border-radius: 14px;
    padding: 16px;
    margin-top: 16px;
    font-size: 1rem;
    color: var(--green);
    font-weight: 600;
  }

  /* ===== HISTORY ===== */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    margin-bottom: 20px;
  }
  .mnav-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 6px 14px;
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .mnav-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .month-title { font-size: 1rem; font-weight: 600; color: var(--accent2); }

  .month-summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    text-align: center;
  }
  .sum-num { font-size: 1.5rem; font-weight: 700; color: var(--accent2); }
  .sum-label { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 20px; }
  .cal-day-name { text-align: center; font-size: 0.68rem; color: var(--muted); font-weight: 600; padding: 4px 0; }
  .cal-cell {
    aspect-ratio: 1;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .cal-cell:hover { border-color: var(--accent); }
  .cal-cell.empty { background: transparent; border-color: transparent; cursor: default; }
  .cal-cell.today { border-color: var(--accent); }
  .c-date { font-size: 0.82rem; font-weight: 600; }
  .c-pct { font-size: 0.6rem; font-weight: 700; }
  .cal-cell.full { background: #1a2e1a; border-color: #34d399; }
  .cal-cell.full .c-pct { color: var(--green); }
  .cal-cell.partial .c-pct { color: var(--yellow); }
  .cal-cell.nodata { opacity: 0.35; }

  .day-detail {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-top: 4px;
  }
  .day-detail h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 12px; color: var(--accent2); }
  .hist-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .hist-item:last-child { border-bottom: none; }
  .hist-check {
    width: 20px; height: 20px; border-radius: 6px;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; flex-shrink: 0;
  }
  .hist-check.done { background: var(--green); border-color: var(--green); }
  .hist-text { font-size: 0.88rem; }
  .hist-text.done { color: var(--done-text); text-decoration: line-through; }
  .no-hist { text-align: center; color: var(--muted); font-size: 0.9rem; padding: 16px 0; }

  /* ===== SYNC ===== */
  .sync-status {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 18px;
    font-size: 0.88rem;
  }
  .sync-status.on { border-color: var(--green); }
  .sync-status.off { color: var(--muted); }
  .sync-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-left:6px; }
  .sync-dot.on { background: var(--green); }
  .sync-dot.off { background: var(--muted); }
  .sync-code-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--card);
    border: 1px dashed var(--accent2);
    border-radius: 10px;
    padding: 10px 14px;
    margin: 10px 0;
    font-family: monospace;
    font-size: 0.95rem;
    letter-spacing: 0.5px;
    word-break: break-all;
  }
  .sync-copy-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.78rem;
    cursor: pointer;
    flex-shrink: 0;
  }
  .sync-note { font-size: 0.78rem; color: var(--muted); margin-top: 6px; line-height: 1.5; }
  .sync-msg { font-size: 0.82rem; margin-top: 8px; min-height: 1.2em; }
  .sync-msg.ok { color: var(--green); }
  .sync-msg.err { color: var(--red); }
</style>
</head>
<body>

<div class="tab-nav">
  <button class="tab-btn active" id="btn-today" onclick="switchTab('today')">✅ আজকের কাজ</button>
  <button class="tab-btn" id="btn-history" onclick="switchTab('history')">📅 হিস্ট্রি</button>
  <button class="tab-btn" id="btn-sync" onclick="switchTab('sync')">🔄 সিঙ্ক</button>
</div>

<!-- TODAY -->
<div class="tab-panel active" id="tab-today">
  <header>
    <h1>✅ দৈনিক চেকলিস্ট</h1>
    <div class="date-badge" id="dateDisplay"></div>
  </header>

  <div class="progress-wrap">
    <div class="progress-info">
      <span id="progressText">০ / ০ সম্পন্ন</span>
      <span id="progressPct">০%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="all-done" id="allDone">🎉 দারুণ! আজকের সব কাজ শেষ!</div>

  <div class="section-label">আজকের কাজ</div>
  <div class="checklist" id="checklist"></div>

  <div class="add-box">
    <h3>নতুন কাজ যোগ করুন</h3>
    <div class="add-row">
      <select class="emoji-pick" id="emojiPick">
        <option>📌</option><option>✏️</option><option>📚</option>
        <option>💻</option><option>🏃</option><option>💊</option>
        <option>🍽️</option><option>📞</option><option>🛒</option>
        <option>🧹</option><option>💰</option><option>🎯</option>
        <option>🌅</option><option>🌙</option><option>🕌</option>
        <option>💧</option><option>🧘</option><option>📵</option>
        <option>🎨</option><option>🛌</option>
      </select>
      <input class="add-input" id="addInput" placeholder="কাজের নাম লিখুন..." maxlength="80" />
      <button class="add-btn" onclick="addTask()">যোগ করুন</button>
    </div>
    <input class="add-input" id="subAddInput" style="margin-top:8px; font-size:0.82rem;" placeholder="সাব-ক্যাটাগরি (ঐচ্ছিক, কমা দিয়ে আলাদা করুন — যেমন: ফজর, যোহর, আসর)" />
    <div class="custom-emoji-row">
      <input class="add-input custom-emoji-input" id="customEmojiInput" placeholder="✨ নিজের আইকন লিখুন (যেমন: 🚴)" maxlength="4" />
      <button class="sub-add-btn" id="addEmojiBtn">+ আইকন যোগ</button>
    </div>
  </div>
  <p class="reset-note">⏰ প্রতিদিন রাত ১২টায় চেকলিস্ট নতুন হয়ে যাবে</p>
</div>

<!-- HISTORY -->
<div class="tab-panel" id="tab-history">
  <div class="month-nav">
    <button class="mnav-btn" id="prevMonthBtn">&#9664; আগে</button>
    <span class="month-title" id="monthTitle"></span>
    <button class="mnav-btn" id="nextMonthBtn">পরে &#9654;</button>
  </div>

  <div class="month-summary" id="monthSummary"></div>

  <div class="section-label">ক্যালেন্ডার</div>
  <div class="cal-grid" id="calGrid"></div>
  <div id="dayDetail" style="display:none"></div>
</div>

<!-- SYNC -->
<div class="tab-panel" id="tab-sync">
  <div class="section-label">ডিভাইস সিঙ্ক</div>
  <div id="syncBody"></div>
</div>

<script>
var DEFAULT_TASKS = [
  { emoji: '🌅', text: 'সকালে ঘুম থেকে উঠুন' },
  { emoji: '🕌', text: 'নামাজ পড়ুন', subItems: [
      { text: 'ফজর' }, { text: 'যোহর' }, { text: 'আসর' }, { text: 'মাগরিব' }, { text: 'এশা' }
    ] },
  { emoji: '💊', text: 'ওষুধ / ভিটামিন খান' },
  { emoji: '💻', text: 'কোড প্র্যাকটিস করুন' },
  { emoji: '📚', text: 'কিছু পড়ুন বা শিখুন' },
  { emoji: '🏃', text: 'ব্যায়াম করুন', subItems: [
      { text: 'পুশআপ' }, { text: 'স্কোয়াট' }, { text: 'দৌড়ানো' }, { text: 'স্ট্রেচিং' }, { text: 'সাইক্লিং' }
    ] },
  { emoji: '🍽️', text: 'সঠিক সময়ে খাবার খান' },
  { emoji: '🌙', text: 'রাতে সঠিক সময়ে ঘুমান' }
];

var BN_DAYS_SHORT = ['রবি','সোম','মঙ্গল','বুধ','বৃহস্পতি','শুক্র','শনি'];
var BN_DAYS_FULL  = ['রবিবার','সোমবার','মঙ্গলবার','বুধবার','বৃহস্পতিবার','শুক্রবার','শনিবার'];
var BN_MONTHS     = ['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'];

var TODAY_KEY   = 'cl_today_v4';
var HISTORY_KEY = 'cl_hist_v4';
var CUSTOM_EMOJI_KEY = 'cl_custom_emoji_v1';
var SYNC_BUCKET_KEY = 'cl_sync_bucket_v1';
var SYNC_UPDATED_KEY = 'cl_sync_updated_v1';
var KVDB_BASE = 'https://kvdb.io/';

var viewYear, viewMonth;
var expandedIdx = {};
var editingIdx = {};

function bn(n) {
  return String(n).replace(/[0-9]/g, function(d) { return '০১২৩৪৫৬৭৮৯'[d]; });
}

function todayStr() {
  var d = new Date();
  var m = String(d.getMonth() + 1).padStart('2', '0');
  var dd = String(d.getDate()).padStart('2', '0');
  return d.getFullYear() + '-' + m + '-' + dd;
}

function padStr(n) { return String(n).padStart(2, '0'); }

function loadToday() {
  try { return JSON.parse(localStorage.getItem(TODAY_KEY)) || null; } catch(e) { return null; }
}
function saveToday(d) { localStorage.setItem(TODAY_KEY, JSON.stringify(d)); schedulePush(); }
function loadHist() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || {}; } catch(e) { return {}; }
}
function saveHist(h) { localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); schedulePush(); }

function archiveDay(data) {
  if (!data || !data.date) return;
  var hist = loadHist();
  hist[data.date] = { tasks: data.tasks };
  saveHist(hist);
}

function cloneTaskTemplate(t, i) {
  var task = { id: Date.now() + i, emoji: t.emoji, text: t.text, done: false };
  if (t.subItems && t.subItems.length) {
    task.subItems = t.subItems.map(function(s) { return { text: s.text, done: false }; });
  }
  return task;
}

function getTodayData() {
  var data = loadToday();
  var today = todayStr();
  if (!data || data.date !== today) {
    if (data && data.date !== today) archiveDay(data);
    var baseTasks = data ? data.tasks : DEFAULT_TASKS;
    var tasks = [];
    for (var i = 0; i < baseTasks.length; i++) {
      tasks.push(cloneTaskTemplate(baseTasks[i], i));
    }
    data = { date: today, tasks: tasks };
    saveToday(data);
  }
  return data;
}

function switchTab(name) {
  document.getElementById('tab-today').classList.remove('active');
  document.getElementById('tab-history').classList.remove('active');
  document.getElementById('tab-sync').classList.remove('active');
  document.getElementById('btn-today').classList.remove('active');
  document.getElementById('btn-history').classList.remove('active');
  document.getElementById('btn-sync').classList.remove('active');
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('btn-' + name).classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'sync') renderSyncTab();
}

function renderDate() {
  var d = new Date();
  document.getElementById('dateDisplay').textContent =
    BN_DAYS_FULL[d.getDay()] + ', ' + d.getDate() + ' ' + BN_MONTHS[d.getMonth()] + ' ' + d.getFullYear();
}

function updateProgress(tasks) {
  var total = tasks.length;
  var done = 0;
  for (var i = 0; i < tasks.length; i++) { if (tasks[i].done) done++; }
  var pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressText').textContent = bn(done) + ' / ' + bn(total) + ' সম্পন্ন';
  document.getElementById('progressPct').textContent = bn(pct) + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('allDone').style.display = (total > 0 && done === total) ? 'block' : 'none';
}

function renderToday() {
  var data = getTodayData();
  var list = document.getElementById('checklist');
  list.innerHTML = '';
  for (var i = 0; i < data.tasks.length; i++) {
    (function(idx) {
      var task = data.tasks[idx];
      var hasSubs = task.subItems && task.subItems.length;
      var isExpanded = !!expandedIdx[idx];

      var subDoneCount = hasSubs ? task.subItems.filter(function(s){return s.done;}).length : 0;
      var allSubsDone = hasSubs ? (subDoneCount === task.subItems.length) : task.done;
      var rowDoneClass = hasSubs ? allSubsDone : task.done;

      var wrap = document.createElement('div');
      wrap.className = 'item-wrap';
      wrap.setAttribute('data-idx', idx);

      var div = document.createElement('div');
      div.className = 'item' + (rowDoneClass ? ' done' : '') + (isExpanded ? ' expanded' : '');
      var titleStyle = task.done
        ? 'text-decoration:line-through;text-decoration-color:#4ade80;color:var(--done-text);'
        : '';
      var subtitleStyle = 'font-size:0.75rem;' +
        (allSubsDone ? 'color:var(--green);font-weight:600;text-decoration:line-through;text-decoration-color:#4ade80;' : 'color:var(--muted);');
      div.innerHTML =
        '<div class="drag-handle" data-role="drag">⠿</div>' +
        '<div class="checkbox' + (task.done ? ' done-check' : '') + '" data-role="check">' + (task.done ? '✓' : '') + '</div>' +
        '<span class="item-emoji">' + task.emoji + '</span>' +
        '<span class="item-text" data-role="text">' +
          '<span style="' + titleStyle + '">' + task.text + '</span>' +
          (hasSubs ? '<br><span style="' + subtitleStyle + '">' +
            (allSubsDone ? '✓ সবগুলো সম্পন্ন' : '(' + bn(subDoneCount) + '/' + bn(task.subItems.length) + ' সম্পন্ন — ট্যাপ করে দেখুন)') +
            '</span>' : '') +
        '</span>' +
        (hasSubs ? '<span class="expand-arrow">▼</span>' : '');

      div.addEventListener('click', function(e) {
        if (longPressFired) { longPressFired = false; return; }
        var role = e.target.closest('[data-role]') ? e.target.closest('[data-role]').getAttribute('data-role') : null;
        if (role === 'drag') { return; }
        if (role === 'check') { toggleTask(idx); return; }
        if (hasSubs) { toggleExpand(idx); return; }
        toggleTask(idx);
      });
      wrap.appendChild(div);
      list.appendChild(wrap);

      var longPressFired = false;
      var longPressTimer = null;
      var textEl = div.querySelector('[data-role="text"]');
      var startLongPress = function() {
        longPressFired = false;
        longPressTimer = setTimeout(function() {
          longPressFired = true;
          toggleEditTask(idx);
        }, 550);
      };
      var cancelLongPress = function() {
        clearTimeout(longPressTimer);
      };
      textEl.addEventListener('mousedown', startLongPress);
      textEl.addEventListener('touchstart', startLongPress, { passive: true });
      textEl.addEventListener('mouseup', cancelLongPress);
      textEl.addEventListener('mouseleave', cancelLongPress);
      textEl.addEventListener('touchend', cancelLongPress);
      textEl.addEventListener('touchmove', cancelLongPress);
      textEl.addEventListener('contextmenu', function(e) { e.preventDefault(); });

      if (hasSubs && isExpanded) {
        var panel = document.createElement('div');
        panel.className = 'sub-panel';
        var subHtml = '';
        for (var s = 0; s < task.subItems.length; s++) {
          var sub = task.subItems[s];
          subHtml += '<div class="sub-item' + (sub.done ? ' done' : '') + '" data-sub="' + s + '">' +
            '<div class="sub-checkbox">' + (sub.done ? '✓' : '') + '</div>' +
            '<span class="sub-text">' + sub.text + '</span>' +
            '</div>';
        }
        panel.innerHTML = subHtml +
          '<div class="sub-add-row">' +
            '<input class="sub-add-input" id="subQuickAdd-' + idx + '" placeholder="নতুন আইটেম যোগ করুন..." />' +
            '<button class="sub-add-btn" data-addsub="' + idx + '">+ যোগ</button>' +
          '</div>';
        panel.addEventListener('click', function(e) {
          var subEl = e.target.closest('[data-sub]');
          if (subEl) { toggleSubItem(idx, parseInt(subEl.getAttribute('data-sub'))); return; }
          var addBtn = e.target.closest('[data-addsub]');
          if (addBtn) { addSubItem(idx); return; }
        });
        wrap.appendChild(panel);
      }

      if (editingIdx[idx]) {
        var editPanel = document.createElement('div');
        editPanel.className = 'edit-panel';
        var escText = function(t) { return String(t).replace(/"/g, '&quot;'); };
        var editHtml = '<div class="edit-label">ক্যাটাগরি</div>' +
          '<div class="edit-row"><input class="edit-input" id="editCat-' + idx + '" value="' + escText(task.text) + '" /></div>';
        if (hasSubs) {
          editHtml += '<div class="edit-label">সাব-ক্যাটাগরি</div>';
          for (var es = 0; es < task.subItems.length; es++) {
            editHtml += '<div class="edit-row"><input class="edit-input" id="editSub-' + idx + '-' + es + '" value="' + escText(task.subItems[es].text) + '" /></div>';
          }
        } else {
          editHtml += '<div class="edit-label">সাব-ক্যাটাগরি</div>';
        }
        editHtml += '<div class="edit-row"><input class="edit-input" id="editNewSub-' + idx + '" placeholder="নতুন সাব-ক্যাটাগরি লিখুন..." />' +
          '<button class="sub-add-btn" data-addsubedit="' + idx + '">+ যোগ</button></div>';
        editHtml += '<div class="edit-actions">' +
          '<button class="edit-save-btn" data-saveedit="' + idx + '">সংরক্ষণ করুন</button>' +
          '<button class="edit-cancel-btn" data-canceledit="' + idx + '">বাতিল</button>' +
          '<button class="edit-delete-btn" data-deleteedit="' + idx + '">🗑️ ডিলিট</button>' +
          '</div>';
        editPanel.innerHTML = editHtml;
        editPanel.addEventListener('click', function(e) {
          var saveBtn = e.target.closest('[data-saveedit]');
          if (saveBtn) { saveEditTask(idx); return; }
          var cancelBtn = e.target.closest('[data-canceledit]');
          if (cancelBtn) { editingIdx[idx] = false; renderToday(); return; }
          var deleteBtn = e.target.closest('[data-deleteedit]');
          if (deleteBtn) {
            if (confirm('আপনি কি নিশ্চিত এই কাজটি ডিলিট করতে চান?')) { deleteTask(idx); }
            return;
          }
          var addSubBtn = e.target.closest('[data-addsubedit]');
          if (addSubBtn) { addSubItemInEdit(idx); return; }
        });
        editPanel.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' && e.target.id === 'editNewSub-' + idx) { addSubItemInEdit(idx); }
        });
        wrap.appendChild(editPanel);
      }
    })(i);
  }
  updateProgress(data.tasks);
  archiveDay(data);
}

function toggleEditTask(idx) {
  editingIdx[idx] = !editingIdx[idx];
  renderToday();
}

/* ===== DRAG TO REORDER ===== */
var dragState = null;

function onDragPointerDown(e) {
  var handle = e.target.closest('.drag-handle');
  if (!handle) return;
  var wrap = handle.closest('.item-wrap');
  if (!wrap) return;
  e.preventDefault();
  dragState = { wrap: wrap, startY: e.clientY, pointerId: e.pointerId };
  wrap.classList.add('dragging');
  try { handle.setPointerCapture(e.pointerId); } catch (err) {}
}

function onDragPointerMove(e) {
  if (!dragState || e.pointerId !== dragState.pointerId) return;
  e.preventDefault();
  var dy = e.clientY - dragState.startY;
  dragState.wrap.style.transform = 'translateY(' + dy + 'px)';

  var list = document.getElementById('checklist');
  var wraps = Array.prototype.slice.call(list.querySelectorAll('.item-wrap'));
  var draggedIndex = wraps.indexOf(dragState.wrap);
  var draggedRect = dragState.wrap.getBoundingClientRect();
  var draggedCenter = draggedRect.top + draggedRect.height / 2;

  if (dy < 0 && draggedIndex > 0) {
    var prev = wraps[draggedIndex - 1];
    var prevRect = prev.getBoundingClientRect();
    if (draggedCenter < prevRect.top + prevRect.height / 2) {
      list.insertBefore(dragState.wrap, prev);
      dragState.startY = e.clientY;
      dragState.wrap.style.transform = 'translateY(0px)';
    }
  } else if (dy > 0 && draggedIndex < wraps.length - 1) {
    var next = wraps[draggedIndex + 1];
    var nextRect = next.getBoundingClientRect();
    if (draggedCenter > nextRect.top + nextRect.height / 2) {
      list.insertBefore(next, dragState.wrap);
      dragState.startY = e.clientY;
      dragState.wrap.style.transform = 'translateY(0px)';
    }
  }
}

function onDragPointerUp(e) {
  if (!dragState || e.pointerId !== dragState.pointerId) return;
  var wrap = dragState.wrap;
  wrap.classList.remove('dragging');
  wrap.style.transform = '';
  dragState = null;

  var list = document.getElementById('checklist');
  var wraps = Array.prototype.slice.call(list.querySelectorAll('.item-wrap'));
  var data = getTodayData();
  var newTasks = wraps.map(function(w) { return data.tasks[parseInt(w.getAttribute('data-idx'), 10)]; });
  data.tasks = newTasks;
  saveToday(data);
  expandedIdx = {};
  editingIdx = {};
  renderToday();
}

(function initDrag() {
  var list = document.getElementById('checklist');
  list.addEventListener('pointerdown', onDragPointerDown);
  list.addEventListener('pointermove', onDragPointerMove);
  list.addEventListener('pointerup', onDragPointerUp);
  list.addEventListener('pointercancel', onDragPointerUp);
})();

function saveEditTask(idx) {
  var data = getTodayData();
  var task = data.tasks[idx];
  var catInput = document.getElementById('editCat-' + idx);
  if (catInput) {
    var newCat = catInput.value.trim();
    if (newCat) task.text = newCat;
  }
  if (task.subItems && task.subItems.length) {
    for (var s = 0; s < task.subItems.length; s++) {
      var subInput = document.getElementById('editSub-' + idx + '-' + s);
      if (subInput) {
        var newSub = subInput.value.trim();
        if (newSub) task.subItems[s].text = newSub;
      }
    }
  }
  saveToday(data);
  editingIdx[idx] = false;
  renderToday();
}

function toggleExpand(idx) {
  expandedIdx[idx] = !expandedIdx[idx];
  renderToday();
}

function toggleSubItem(idx, subIdx) {
  var data = getTodayData();
  var task = data.tasks[idx];
  task.subItems[subIdx].done = !task.subItems[subIdx].done;
  task.done = task.subItems.some(function(s) { return s.done; });
  saveToday(data);
  renderToday();
}

function addSubItem(idx) {
  var input = document.getElementById('subQuickAdd-' + idx);
  var text = input ? input.value.trim() : '';
  if (!text) return;
  var data = getTodayData();
  var task = data.tasks[idx];
  if (!task.subItems) task.subItems = [];
  task.subItems.push({ text: text, done: false });
  task.done = task.subItems.some(function(s) { return s.done; });
  saveToday(data);
  renderToday();
}

function addSubItemInEdit(idx) {
  var input = document.getElementById('editNewSub-' + idx);
  var text = input ? input.value.trim() : '';
  if (!text) return;
  var data = getTodayData();
  var task = data.tasks[idx];
  if (!task.subItems) task.subItems = [];
  task.subItems.push({ text: text, done: false });
  task.done = task.subItems.some(function(s) { return s.done; });
  saveToday(data);
  editingIdx[idx] = true;
  renderToday();
}

function toggleTask(idx) {
  var data = getTodayData();
  var task = data.tasks[idx];
  if (task.subItems && task.subItems.length) {
    var newState = !task.done;
    for (var i = 0; i < task.subItems.length; i++) { task.subItems[i].done = newState; }
    task.done = newState;
  } else {
    task.done = !task.done;
  }
  saveToday(data);
  renderToday();
}

function deleteTask(idx) {
  var data = getTodayData();
  data.tasks.splice(idx, 1);
  saveToday(data);
  expandedIdx = {};
  editingIdx = {};
  renderToday();
}

function addTask() {
  var input = document.getElementById('addInput');
  var text = input.value.trim();
  if (!text) { input.focus(); return; }
  var emoji = document.getElementById('emojiPick').value;
  var subInput = document.getElementById('subAddInput');
  var subRaw = subInput ? subInput.value.trim() : '';
  var data = getTodayData();
  var newTask = { id: Date.now(), emoji: emoji, text: text, done: false };
  if (subRaw) {
    var parts = subRaw.split(',').map(function(s) { return s.trim(); }).filter(Boolean);
    if (parts.length) {
      newTask.subItems = parts.map(function(p) { return { text: p, done: false }; });
    }
  }
  data.tasks.push(newTask);
  saveToday(data);
  input.value = '';
  if (subInput) subInput.value = '';
  renderToday();
  input.focus();
}

document.getElementById('addInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addTask();
});

/* ===== CUSTOM ICONS ===== */
function loadCustomEmojis() {
  try { return JSON.parse(localStorage.getItem(CUSTOM_EMOJI_KEY)) || []; } catch(e) { return []; }
}
function saveCustomEmojis(arr) { localStorage.setItem(CUSTOM_EMOJI_KEY, JSON.stringify(arr)); schedulePush(); }

function populateCustomEmojis() {
  var select = document.getElementById('emojiPick');
  var existing = [];
  for (var i = 0; i < select.options.length; i++) existing.push(select.options[i].value);
  var custom = loadCustomEmojis();
  for (var c = 0; c < custom.length; c++) {
    if (existing.indexOf(custom[c]) === -1) {
      var opt = document.createElement('option');
      opt.textContent = custom[c];
      select.appendChild(opt);
    }
  }
}

function addCustomEmoji() {
  var input = document.getElementById('customEmojiInput');
  var val = input.value.trim();
  if (!val) { input.focus(); return; }
  var select = document.getElementById('emojiPick');
  var existing = [];
  for (var i = 0; i < select.options.length; i++) existing.push(select.options[i].value);
  if (existing.indexOf(val) === -1) {
    var opt = document.createElement('option');
    opt.textContent = val;
    select.appendChild(opt);
    var custom = loadCustomEmojis();
    custom.push(val);
    saveCustomEmojis(custom);
  }
  select.value = val;
  input.value = '';
  input.focus();
}

document.getElementById('addEmojiBtn').addEventListener('click', addCustomEmoji);
document.getElementById('customEmojiInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addCustomEmoji();
});
populateCustomEmojis();

/* ===== HISTORY ===== */
function initMonth() {
  var now = new Date();
  viewYear = now.getFullYear();
  viewMonth = now.getMonth();
}

document.getElementById('prevMonthBtn').addEventListener('click', function() {
  viewMonth--;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  renderHistory();
});
document.getElementById('nextMonthBtn').addEventListener('click', function() {
  viewMonth++;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderHistory();
});

function renderHistory() {
  var hist = loadHist();
  var todayData = loadToday();
  if (todayData) hist[todayData.date] = { tasks: todayData.tasks };

  document.getElementById('monthTitle').textContent = BN_MONTHS[viewMonth] + ' ' + viewYear;

  var daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  var totalDays = 0, fullDays = 0, totalPct = 0;
  for (var d = 1; d <= daysInMonth; d++) {
    var key = viewYear + '-' + padStr(viewMonth + 1) + '-' + padStr(d);
    if (hist[key] && hist[key].tasks && hist[key].tasks.length) {
      totalDays++;
      var tasks = hist[key].tasks;
      var done = 0;
      for (var t = 0; t < tasks.length; t++) { if (tasks[t].done) done++; }
      var pct = Math.round(done / tasks.length * 100);
      totalPct += pct;
      if (pct === 100) fullDays++;
    }
  }
  var avgPct = totalDays ? Math.round(totalPct / totalDays) : 0;

  document.getElementById('monthSummary').innerHTML =
    '<div><div class="sum-num">' + bn(totalDays) + '</div><div class="sum-label">সক্রিয় দিন</div></div>' +
    '<div><div class="sum-num">' + bn(fullDays) + '</div><div class="sum-label">পুরো শেষ</div></div>' +
    '<div><div class="sum-num">' + bn(avgPct) + '%</div><div class="sum-label">গড় অগ্রগতি</div></div>';

  var grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  for (var di = 0; di < BN_DAYS_SHORT.length; di++) {
    var dn = document.createElement('div');
    dn.className = 'cal-day-name';
    dn.textContent = BN_DAYS_SHORT[di];
    grid.appendChild(dn);
  }

  var firstDay = new Date(viewYear, viewMonth, 1).getDay();
  for (var e = 0; e < firstDay; e++) {
    var emp = document.createElement('div');
    emp.className = 'cal-cell empty';
    grid.appendChild(emp);
  }

  var todayKey = todayStr();
  for (var day = 1; day <= daysInMonth; day++) {
    (function(dd) {
      var k = viewYear + '-' + padStr(viewMonth + 1) + '-' + padStr(dd);
      var cell = document.createElement('div');
      var cls = 'cal-cell';
      if (k === todayKey) cls += ' today';
      var dayHist = hist[k];
      var pctVal = null;
      if (dayHist && dayHist.tasks && dayHist.tasks.length) {
        var dn2 = 0;
        for (var tx = 0; tx < dayHist.tasks.length; tx++) { if (dayHist.tasks[tx].done) dn2++; }
        pctVal = Math.round(dn2 / dayHist.tasks.length * 100);
        if (pctVal === 100) cls += ' full';
        else if (pctVal > 0) cls += ' partial';
      } else {
        cls += ' nodata';
      }
      cell.className = cls;
      cell.innerHTML = '<span class="c-date">' + dd + '</span>' +
        (pctVal !== null ? '<span class="c-pct">' + pctVal + '%</span>' : '');
      if (dayHist) {
        cell.addEventListener('click', function() { showDayDetail(k, dayHist, dd); });
      }
      grid.appendChild(cell);
    })(day);
  }

  document.getElementById('dayDetail').style.display = 'none';
}

function showDayDetail(key, dayHist, d) {
  var parts = key.split('-');
  var dateObj = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
  var tasks = dayHist.tasks || [];
  var done = 0;
  for (var i = 0; i < tasks.length; i++) { if (tasks[i].done) done++; }

  var html = '<h3>' + BN_DAYS_FULL[dateObj.getDay()] + ', ' + bn(d) + ' ' + BN_MONTHS[parseInt(parts[1]) - 1] + ' ' + bn(parts[0]) +
    ' &mdash; ' + bn(done) + '/' + bn(tasks.length) + ' সম্পন্ন</h3>';

  if (tasks.length === 0) {
    html += '<p class="no-hist">কোনো ডেটা নেই</p>';
  } else {
    for (var j = 0; j < tasks.length; j++) {
      html += '<div class="hist-item">' +
        '<div class="hist-check' + (tasks[j].done ? ' done' : '') + '">' + (tasks[j].done ? '✓' : '') + '</div>' +
        '<span class="item-emoji">' + tasks[j].emoji + '</span>' +
        '<span class="hist-text' + (tasks[j].done ? ' done' : '') + '">' + tasks[j].text + '</span>' +
        '</div>';
      if (tasks[j].subItems && tasks[j].subItems.length) {
        html += '<div style="padding:0 0 8px 38px; display:flex; flex-wrap:wrap; gap:6px;">';
        for (var k = 0; k < tasks[j].subItems.length; k++) {
          var sub = tasks[j].subItems[k];
          html += '<span style="font-size:0.78rem; padding:3px 10px; border-radius:10px; background:' +
            (sub.done ? 'var(--done-bg); color:var(--done-text);' : 'var(--card); color:var(--muted);') + '">' +
            (sub.done ? '✓ ' : '') + sub.text + '</span>';
        }
        html += '</div>';
      }
    }
  }

  var detail = document.getElementById('dayDetail');
  detail.className = 'day-detail';
  detail.innerHTML = html;
  detail.style.display = 'block';
  detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

/* ===== SYNC (kvdb.io) ===== */
var pushTimer = null;
var pullPollTimer = null;

function getSyncBucket() { return localStorage.getItem(SYNC_BUCKET_KEY) || ''; }
function setSyncBucket(id) { localStorage.setItem(SYNC_BUCKET_KEY, id); }
function clearSyncBucket() {
  localStorage.removeItem(SYNC_BUCKET_KEY);
  localStorage.removeItem(SYNC_UPDATED_KEY);
  clearInterval(pullPollTimer);
}

function schedulePush() {
  if (!getSyncBucket()) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(pushToCloud, 900);
}

function pushToCloud() {
  var bucket = getSyncBucket();
  if (!bucket) return;
  var payload = {
    today: loadToday(),
    hist: loadHist(),
    customEmoji: loadCustomEmojis(),
    updatedAt: Date.now()
  };
  localStorage.setItem(SYNC_UPDATED_KEY, String(payload.updatedAt));
  fetch(KVDB_BASE + bucket + '/appdata', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).catch(function(e) { console.warn('sync push failed', e); });
}

function pullFromCloud() {
  var bucket = getSyncBucket();
  if (!bucket) return Promise.resolve(false);
  return fetch(KVDB_BASE + bucket + '/appdata', { headers: { 'Accept': 'application/json' } })
    .then(function(res) {
      if (res.status === 404) return false;
      if (!res.ok) throw new Error('http ' + res.status);
      return res.json().then(function(remote) {
        var localUpdated = parseInt(localStorage.getItem(SYNC_UPDATED_KEY) || '0', 10);
        if (remote && remote.updatedAt && remote.updatedAt > localUpdated) {
          if (remote.today) localStorage.setItem(TODAY_KEY, JSON.stringify(remote.today));
          if (remote.hist) localStorage.setItem(HISTORY_KEY, JSON.stringify(remote.hist));
          if (remote.customEmoji) localStorage.setItem(CUSTOM_EMOJI_KEY, JSON.stringify(remote.customEmoji));
          localStorage.setItem(SYNC_UPDATED_KEY, String(remote.updatedAt));
          return true;
        }
        return false;
      });
    })
    .catch(function(e) { console.warn('sync pull failed', e); return false; });
}

function createSyncBucket() {
  return fetch(KVDB_BASE, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: 'default_ttl=0'
  }).then(function(res) {
    if (!res.ok) throw new Error('bucket create failed');
    return res.text();
  }).then(function(id) {
    id = id.trim();
    setSyncBucket(id);
    startSyncPolling();
    return id;
  });
}

function startSyncPolling() {
  clearInterval(pullPollTimer);
  if (!getSyncBucket()) return;
  pullPollTimer = setInterval(function() {
    pullFromCloud().then(function(changed) {
      if (changed) {
        renderToday();
        if (document.getElementById('tab-history').classList.contains('active')) renderHistory();
      }
    });
  }, 20000);
}

function renderSyncTab() {
  var box = document.getElementById('syncBody');
  var bucket = getSyncBucket();
  if (!bucket) {
    box.innerHTML =
      '<div class="sync-status off">এই ডিভাইসে সিঙ্ক বন্ধ আছে <span class="sync-dot off"></span>' +
      '<div class="sync-note">সিঙ্ক চালু করলে একটি কোড তৈরি হবে। অন্য মোবাইলে এই একই অ্যাপ খুলে সেই কোড বসালে দুই ডিভাইসের ডাটা এক থাকবে।</div>' +
      '</div>' +
      '<div class="add-box">' +
        '<h3>নতুন সিঙ্ক শুরু করুন</h3>' +
        '<button class="add-btn" id="syncCreateBtn" style="width:100%;">🆕 নতুন সিঙ্ক কোড তৈরি করুন</button>' +
        '<div class="sync-msg" id="syncCreateMsg"></div>' +
      '</div>' +
      '<div class="add-box">' +
        '<h3>অন্য ডিভাইসের কোড দিয়ে যুক্ত করুন</h3>' +
        '<div class="add-row">' +
          '<input class="add-input" id="syncJoinInput" placeholder="সিঙ্ক কোড পেস্ট করুন..." />' +
          '<button class="add-btn" id="syncJoinBtn">যুক্ত করুন</button>' +
        '</div>' +
        '<div class="sync-msg" id="syncJoinMsg"></div>' +
      '</div>';

    document.getElementById('syncCreateBtn').addEventListener('click', function() {
      var btn = this;
      var msg = document.getElementById('syncCreateMsg');
      btn.disabled = true;
      msg.textContent = 'কোড তৈরি হচ্ছে...';
      msg.className = 'sync-msg';
      createSyncBucket().then(function() {
        pushToCloud();
        msg.textContent = '✅ সিঙ্ক চালু হয়েছে!';
        msg.className = 'sync-msg ok';
        renderSyncTab();
      }).catch(function() {
        btn.disabled = false;
        msg.textContent = '❌ কোড তৈরি করা যায়নি, ইন্টারনেট চেক করে আবার চেষ্টা করুন।';
        msg.className = 'sync-msg err';
      });
    });

    document.getElementById('syncJoinBtn').addEventListener('click', function() {
      var input = document.getElementById('syncJoinInput');
      var msg = document.getElementById('syncJoinMsg');
      var code = input.value.trim();
      if (!code) { msg.textContent = 'কোড লিখুন।'; msg.className = 'sync-msg err'; return; }
      setSyncBucket(code);
      localStorage.setItem(SYNC_UPDATED_KEY, '0');
      msg.textContent = 'সংযুক্ত হচ্ছে...';
      msg.className = 'sync-msg';
      pullFromCloud().then(function() {
        startSyncPolling();
        msg.textContent = '✅ সংযুক্ত হয়েছে!';
        msg.className = 'sync-msg ok';
        renderToday();
        renderSyncTab();
      }).catch(function() {
        msg.textContent = '❌ যুক্ত করা যায়নি, কোড ঠিক আছে কি না দেখুন।';
        msg.className = 'sync-msg err';
      });
    });
    return;
  }

  box.innerHTML =
    '<div class="sync-status on">এই ডিভাইসে সিঙ্ক চালু আছে <span class="sync-dot on"></span>' +
    '<div class="sync-code-box"><span id="syncCodeText" style="flex:1;">' + bucket + '</span>' +
      '<button class="sync-copy-btn" id="syncCopyBtn">কপি</button></div>' +
    '<div class="sync-note">অন্য মোবাইলে এই একই অ্যাপ খুলে "কোড দিয়ে যুক্ত করুন" অপশনে এই কোডটি বসালেই দুই ডিভাইসের ডাটা এক হয়ে যাবে। এই কোডটি কাউকে শেয়ার করবেন না — যার কাছে কোড থাকবে সে আপনার ডাটা দেখতে ও বদলাতে পারবে।</div>' +
    '</div>' +
    '<div class="add-box">' +
      '<button class="add-btn" id="syncNowBtn" style="width:100%;">🔄 এখনই সিঙ্ক করুন</button>' +
      '<div class="sync-msg" id="syncNowMsg"></div>' +
    '</div>' +
    '<div class="add-box">' +
      '<button class="edit-delete-btn" id="syncOffBtn" style="width:100%; padding:10px;">❌ এই ডিভাইসে সিঙ্ক বন্ধ করুন</button>' +
      '<div class="sync-note">এতে শুধু এই ফোনের সাথে সংযোগ কাটবে, ক্লাউডে সেভ করা ডাটা মুছবে না।</div>' +
    '</div>';

  document.getElementById('syncCopyBtn').addEventListener('click', function() {
    var msg = document.getElementById('syncNowMsg');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(bucket).then(function() {
        this.textContent = '✅';
        setTimeout(function() { document.getElementById('syncCopyBtn') && (document.getElementById('syncCopyBtn').textContent = 'কপি'); }, 1200);
      }.bind(this));
    }
  });

  document.getElementById('syncNowBtn').addEventListener('click', function() {
    var msg = document.getElementById('syncNowMsg');
    msg.textContent = 'সিঙ্ক হচ্ছে...';
    msg.className = 'sync-msg';
    pullFromCloud().then(function(changed) {
      pushToCloud();
      msg.textContent = changed ? '✅ নতুন ডাটা পাওয়া গেছে ও আপডেট হয়েছে।' : '✅ সব ঠিক আছে, সবচেয়ে নতুন ডাটাই আছে।';
      msg.className = 'sync-msg ok';
      renderToday();
      if (document.getElementById('tab-history').classList.contains('active')) renderHistory();
    }).catch(function() {
      msg.textContent = '❌ সিঙ্ক করা যায়নি, ইন্টারনেট চেক করুন।';
      msg.className = 'sync-msg err';
    });
  });

  document.getElementById('syncOffBtn').addEventListener('click', function() {
    if (confirm('এই ফোনে সিঙ্ক বন্ধ করতে চান? ক্লাউডের ডাটা থাকবে, শুধু এই ফোন আর সংযুক্ত থাকবে না।')) {
      clearSyncBucket();
      renderSyncTab();
    }
  });
}

setInterval(function() {
  var d = loadToday();
  if (d && d.date !== todayStr()) { archiveDay(d); renderToday(); }
}, 60000);

initMonth();
renderDate();
if (getSyncBucket()) {
  document.getElementById('checklist').innerHTML = '<div style="text-align:center;color:var(--muted);padding:24px;">🔄 সিঙ্ক হচ্ছে...</div>';
  pullFromCloud().then(function() {
    renderToday();
    startSyncPolling();
  }).catch(function() {
    renderToday();
    startSyncPolling();
  });
} else {
  renderToday();
}
</script>
